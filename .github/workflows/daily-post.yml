name: Daily Quran Post

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download Arabic font
        run: |
          mkdir -p fonts
          curl -L "https://github.com/alif-type/amiri/releases/download/1.000/Amiri-1.000.zip" -o amiri.zip
          unzip amiri.zip -d amiri_extracted
          find amiri_extracted -name "Amiri-Regular.ttf" -exec cp {} fonts/ \;

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
        run: python main.py
